{% extends "base.html" %}

{% block title %}訂單查詢 - AISOTS{% endblock %}

{% block extra_css %}
<style>
    .filter-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        align-items: center;
    }
    .filter-bar select, .filter-bar input {
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 14px;
    }
    .filter-bar button {
        padding: 8px 16px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .filter-bar button:hover {
        background: #2980b9;
    }
    .stats-bar {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        padding: 10px;
        background: var(--bg-card);
        border-radius: 5px;
    }
    .stats-item {
        text-align: center;
    }
    .stats-item .count {
        font-size: 24px;
        font-weight: bold;
    }
    .stats-item .label {
        font-size: 12px;
        color: var(--text-secondary);
    }
    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
    }
    .status-Pending { background: #fff3cd; color: #856404; }
    .status-Submitted { background: #cce5ff; color: #004085; }
    .status-Filled { background: #d4edda; color: #155724; }
    .status-Cancelled { background: #f8d7da; color: #721c24; }
    .status-Rejected { background: #f8d7da; color: #721c24; }
    .action-buy { color: #e74c3c; font-weight: bold; }
    .action-sell { color: #27ae60; font-weight: bold; }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }
    th, td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
    }
    th {
        background: var(--bg-card);
        font-weight: bold;
    }
    tr:hover {
        background: var(--bg-card);
    }
    .order-time {
        font-size: 12px;
        color: var(--text-secondary);
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📋 訂單列表</div>
    
    <div class="filter-bar">
        <select id="statusFilter">
            <option value="">全部狀態</option>
            <option value="Pending">待處理</option>
            <option value="Submitted">已提交</option>
            <option value="Filled">已成交</option>
            <option value="Cancelled">已取消</option>
            <option value="Rejected">已拒絕</option>
        </select>
        <select id="strategyFilter">
            <option value="">全部策略</option>
        </select>
        <select id="dateFilter">
            <option value="today">今日</option>
            <option value="yesterday">昨日</option>
            <option value="week">本週</option>
            <option value="month">本月</option>
            <option value="all">全部</option>
        </select>
        <button onclick="loadOrders()">篩選</button>
    </div>
    
    <div class="stats-bar" id="statsBar">
        <div class="stats-item">
            <div class="count" id="statTotal">0</div>
            <div class="label">總訂單</div>
        </div>
        <div class="stats-item">
            <div class="count" id="statFilled" style="color: #27ae60;">0</div>
            <div class="label">已成交</div>
        </div>
        <div class="stats-item">
            <div class="count" id="statPending" style="color: #f39c12;">0</div>
            <div class="label">待處理</div>
        </div>
        <div class="stats-item">
            <div class="count" id="statCancelled" style="color: #95a5a6;">0</div>
            <div class="label">已取消</div>
        </div>
    </div>
    
    <div id="orderList">
        <div class="loading">載入中...</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadStrategies() {
    try {
        const response = await fetch('/api/strategies');
        const data = await response.json();
        
        if (data.success && data.data) {
            const select = document.getElementById('strategyFilter');
            data.data.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id;
                option.textContent = `${s.id} - ${s.name || s.id}`;
                select.appendChild(option);
            });
        }
    } catch (e) {
        console.error('載入策略失敗:', e);
    }
}

async function loadOrders() {
    const status = document.getElementById('statusFilter').value;
    const strategyId = document.getElementById('strategyFilter').value;
    const date = document.getElementById('dateFilter').value;
    
    let url = '/api/orders?';
    if (status) url += `status=${status}&`;
    if (strategyId) url += `strategy_id=${strategyId}&`;
    
    if (date === 'today') {
        // Default is today, no param needed
    } else if (date === 'all') {
        url = '/api/orders/all?';
    } else if (date === 'yesterday' || date === 'week' || date === 'month') {
        url += `date=${date}&`;
    }
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (!data.success) {
            document.getElementById('orderList').innerHTML = '<div class="empty-state">載入失敗</div>';
            return;
        }
        
        const orders = data.data || [];
        
        document.getElementById('statTotal').textContent = data.summary?.total || orders.length;
        document.getElementById('statFilled').textContent = data.summary?.filled || 0;
        document.getElementById('statPending').textContent = data.summary?.pending || 0;
        document.getElementById('statCancelled').textContent = data.summary?.cancelled || 0;
        
        if (orders.length === 0) {
            document.getElementById('orderList').innerHTML = '<div class="empty-state">目前沒有訂單</div>';
            return;
        }
        
        const rows = orders.map(o => {
            return `
                <tr>
                    <td>
                        <div>${formatTime(o.timestamp)}</div>
                        ${o.filled_time ? `<div class="order-time">${formatTime(o.filled_time)}</div>` : ''}
                    </td>
                    <td>${o.strategy_id || '-'}</td>
                    <td><code>${o.order_id || '-'}</code></td>
                    <td>${o.symbol || '-'}</td>
                    <td class="${o.action === 'Buy' ? 'action-buy' : 'action-sell'}">${o.action || '-'}</td>
                    <td>${o.quantity || 0}</td>
                    <td>${o.price || 0}</td>
                    <td><span class="status-badge status-${o.status || 'Pending'}">${getStatusText(o.status)}</span></td>
                    <td>${o.reason || ''}</td>
                    <td>${o.filled_price || '-'}</td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('orderList').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>策略</th>
                        <th>訂單 ID</th>
                        <th>期貨</th>
                        <th>方向</th>
                        <th>口數</th>
                        <th>價格</th>
                        <th>狀態</th>
                        <th>原因</th>
                        <th>成交價</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows}
                </tbody>
            </table>
        `;
    } catch (e) {
        console.error(e);
        document.getElementById('orderList').innerHTML = '<div class="empty-state">載入失敗</div>';
    }
}

function formatTime(timestamp) {
    if (!timestamp) return '-';
    try {
        const dt = new Date(timestamp);
        return dt.toLocaleString('zh-TW', { 
            month: '2-digit', 
            day: '2-digit', 
            hour: '2-digit', 
            minute: '2-digit',
            second: '2-digit'
        });
    } catch {
        return timestamp;
    }
}

function getStatusText(status) {
    const map = {
        'Pending': '待處理',
        'Submitted': '已提交',
        'Filled': '已成交',
        'Cancelled': '已取消',
        'Rejected': '已拒絕'
    };
    return map[status] || status;
}

loadStrategies();
loadOrders();
setInterval(loadOrders, REFRESH_INTERVAL);
</script>
{% endblock %}
