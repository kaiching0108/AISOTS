{% extends "base.html" %}

{% block title %}部位查詢 - AISOTS{% endblock %}

{% block extra_css %}
<style>
    .filter-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        align-items: center;
    }
    .filter-bar select, .filter-bar input {
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 14px;
    }
    .filter-bar button {
        padding: 8px 16px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .filter-bar button:hover {
        background: #2980b9;
    }
    .stats-bar {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        padding: 10px;
        background: var(--bg-card);
        border-radius: 5px;
    }
    .stats-item {
        text-align: center;
    }
    .stats-item .count {
        font-size: 24px;
        font-weight: bold;
    }
    .stats-item .label {
        font-size: 12px;
        color: var(--text-secondary);
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }
    th, td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
    }
    th {
        background: var(--bg-card);
        font-weight: bold;
    }
    tr:hover {
        background: var(--bg-card);
    }
    .position-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border: 1px solid var(--border-color);
        border-radius: 5px;
        margin-bottom: 10px;
    }
    .position-symbol {
        font-weight: bold;
        font-size: 16px;
    }
    .position-direction {
        margin-left: 10px;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: bold;
    }
    .direction-buy {
        background: rgba(248,81,73,0.15);
        color: var(--danger);
    }
    .direction-sell {
        background: rgba(63,185,80,0.15);
        color: var(--success);
    }
    .position-details {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📦 部位列表</div>
    
    <div class="filter-bar">
        <select id="strategyFilter">
            <option value="">全部策略</option>
        </select>
        <button onclick="loadPositions()">篩選</button>
    </div>
    
    <div class="stats-bar" id="statsBar">
        <div class="stats-item">
            <div class="count" id="statTotal">0</div>
            <div class="label">總部位</div>
        </div>
        <div class="stats-item">
            <div class="count" id="statQuantity">0</div>
            <div class="label">總口數</div>
        </div>
        <div class="stats-item">
            <div class="count" id="statPnl" style="color: #27ae60;">0</div>
            <div class="label">總損益</div>
        </div>
    </div>
    
    <div id="positionList">
        <div class="loading">載入中...</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadStrategies() {
    try {
        const response = await fetch('/api/strategies');
        const data = await response.json();
        
        if (data.success && data.data) {
            const select = document.getElementById('strategyFilter');
            data.data.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id;
                option.textContent = `${s.id} - ${s.name || s.id}`;
                select.appendChild(option);
            });
        }
    } catch (e) {
        console.error('載入策略失敗:', e);
    }
}

async function loadPositions() {
    const strategyId = document.getElementById('strategyFilter').value;
    
    let url = '/api/positions?';
    if (strategyId) {
        url += `strategy_id=${strategyId}&`;
    }
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (!data.success || !data.data || data.data.length === 0) {
            document.getElementById('positionList').innerHTML = '<div class="empty-state">目前沒有部位</div>';
            document.getElementById('statTotal').textContent = '0';
            document.getElementById('statQuantity').textContent = '0';
            document.getElementById('statPnl').textContent = '0';
            return;
        }
        
        const positions = data.data;
        
        document.getElementById('statTotal').textContent = positions.length;
        document.getElementById('statQuantity').textContent = data.summary.total_quantity;
        
        const totalPnl = data.summary.total_pnl || 0;
        document.getElementById('statPnl').textContent = (totalPnl >= 0 ? '+' : '') + totalPnl.toLocaleString();
        document.getElementById('statPnl').style.color = totalPnl >= 0 ? '#27ae60' : '#e74c3c';
        
        document.getElementById('positionList').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>策略</th>
                        <th>期貨</th>
                        <th>方向</th>
                        <th>口數</th>
                        <th>進場價</th>
                        <th>現價</th>
                        <th>損益</th>
                    </tr>
                </thead>
                <tbody>
                    ${positions.map(p => `
                        <tr>
                            <td>${p.strategy_id}</td>
                            <td><strong>${p.symbol}</strong></td>
                            <td><span class="position-direction ${p.direction === 'Buy' ? 'direction-buy' : 'direction-sell'}">${p.direction === 'Buy' ? '多' : '空'}</span></td>
                            <td>${p.quantity}</td>
                            <td>${p.entry_price}</td>
                            <td>${p.current_price}</td>
                            <td class="${p.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}" style="font-weight: bold;">
                                ${p.pnl >= 0 ? '+' : ''}${p.pnl.toLocaleString()}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        console.error(e);
        document.getElementById('positionList').innerHTML = '<div class="empty-state">載入失敗</div>';
    }
}

loadStrategies();
loadPositions();
setInterval(loadPositions, 30000);
</script>
{% endblock %}
