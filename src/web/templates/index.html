{% extends "base.html" %}

{% block title %}系統總覽 - AISOTS{% endblock %}

{% block content %}
<!-- 系統狀態 + 策略概覽 合併 -->
<div class="card">
    <div class="card-header">📊 系統狀態</div>
    <div>
        <div id="systemStatus">
            <div class="loading">載入中...</div>
        </div>
    </div>
</div>

<!-- 部位概覽 + 風控狀態 合併 -->
<div class="card">
    <div style="display: flex; gap: 30px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 280px; border-right: 1px solid #eee; padding-right: 20px;">
            <div style="font-weight: bold; margin-bottom: 10px; color: #333;">📦 部位概覽</div>
            <div id="positionOverview">
                <div class="loading">載入中...</div>
            </div>
        </div>
        <div style="flex: 1; min-width: 250px; padding-left: 10px;">
            <div style="font-weight: bold; margin-bottom: 10px; color: #333;">🛡️ 風控狀態</div>
            <div id="riskStatus">
                <div class="loading">載入中...</div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <span>📜 重要交易訊息</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="logFilter" onchange="loadTradeLogs()" style="padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
                <option value="">全部類型</option>
                <option value="ORDER_SUCCESS">下單成功</option>
                <option value="CLOSE_POSITION">平倉</option>
                <option value="RISK_BLOCKED">風控擋單</option>
                <option value="ORDER_FAILED">下單失敗</option>
            </select>
            <button onclick="loadTradeLogs()" class="btn btn-sm" style="padding: 5px 12px; font-size: 13px;">
                🔄 刷新
            </button>
        </div>
    </div>
    <div id="tradeLogs" style="max-height: 400px; overflow-y: auto;">
        <div class="loading">載入中...</div>
    </div>
    <div id="logStats" style="padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; font-size: 12px; color: #666;">
        統計載入中...
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function loadSystemStatus() {
        try {
            const [statusRes, strategiesRes, positionsRes, riskRes, perfRes] = await Promise.all([
                fetch('/api/status'),
                fetch('/api/strategies'),
                fetch('/api/positions'),
                fetch('/api/risk'),
                fetch('/api/performance?period=today')
            ]);
            
            const statusData = await statusRes.json();
            const strategiesData = await strategiesRes.json();
            const positionsData = await positionsRes.json();
            const riskData = await riskRes.json();
            const perfData = await perfRes.json();
            
            // System Status + Strategy Overview Combined
            const enabled = strategiesData.data?.filter(s => s.enabled).length || 0;
            const total = strategiesData.count || 0;
            const running = strategiesData.data?.filter(s => s.is_running).length || 0;
            const pnl = perfData.success ? perfData.total_pnl : (positionsData.summary?.total_pnl || 0);
            const pnlClass = pnl >= 0 ? 'color: #27ae60;' : 'color: #e74c3c;';
            
            document.getElementById('systemStatus').innerHTML = `
                <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold;"><span class="status-dot status-dot-green"></span> 正常</div>
                                <div style="color: #666; font-size: 11px;">系統連線</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold;">${total}</div>
                                <div style="color: #666; font-size: 11px;">策略總數</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold;">${enabled}</div>
                                <div style="color: #666; font-size: 11px;">啟用</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold;">${running}</div>
                                <div style="color: #666; font-size: 11px;">執行中</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold;">${positionsData.summary?.total_quantity || 0}</div>
                                <div style="color: #666; font-size: 11px;">部口數</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold; ${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()}</div>
                                <div style="color: #666; font-size: 11px;">當日損益</div>
                                ${perfData.success && perfData.realized_pnl !== undefined ? `
                                <div style="font-size: 10px; color: #999; margin-top: 2px;">
                                    已實現: ${perfData.realized_pnl?.toLocaleString() ?? 0} | 未實現: ${perfData.unrealized_pnl?.toLocaleString() ?? 0}
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    <div style="flex: 1; min-width: 220px; border-left: 1px solid #eee; padding-left: 20px;">
                        <div style="font-weight: bold; margin-bottom: 10px; color: #333;">💾 SQLite 數據</div>
                        ${statusData.sqlite_error ? `
                            <div style="color: #e74c3c; font-size: 12px;">${statusData.sqlite_error}</div>
                        ` : `
                            <div>
                                ${Object.entries(statusData.sqlite || {}).map(([symbol, data]) => {
                                    const count = typeof data === 'number' ? data : (data?.count || 0);
                                    const workdayGaps = typeof data === 'object' ? (data?.workday_gaps || 0) : 0;
                                    const tradingSuspicious = typeof data === 'object' ? (data?.trading_hours_suspicious || 0) : 0;
                                    const hasIssues = workdayGaps > 0 || tradingSuspicious > 0;
                                    return \`
                                        <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;">
                                            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                                                <span>\${hasIssues ? '⚠️' : '✅'} \${symbol}</span>
                                                <span>\${Number(count).toLocaleString()} 筆</span>
                                            </div>
                                            <div style="font-size: 11px; color: #888; margin-top: 4px;">
                                                <div>工作日缺口: \${workdayGaps} 天</div>
                                                <div>交易時段異常: \${tradingSuspicious} 天</div>
                                            </div>
                                        </div>
                                    \`;
                                }).join('')}
                                <div style="border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px; font-weight: bold; font-size: 13px;">
                                    總計：${Number(statusData.total || 0).toLocaleString()} 筆
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            // Position Overview
            const positions = positionsData.data || [];
            if (positions.length === 0) {
                document.getElementById('positionOverview').innerHTML = '<div class="empty-state" style="padding: 20px;">目前無部位</div>';
            } else {
                document.getElementById('positionOverview').innerHTML = positions.map(p => `
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee;">
                        <div>
                            <strong>${p.symbol}</strong> ${p.direction} ${p.quantity}口
                            <span style="color: #666; font-size: 12px;">@ ${p.entry_price}</span>
                        </div>
                        <div class="${p.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}" style="font-weight: bold;">
                            ${p.pnl >= 0 ? '+' : ''}${p.pnl.toLocaleString()}
                        </div>
                    </div>
                `).join('');
            }
            
            // Risk Status
            const risk = riskData.data || {};
            document.getElementById('riskStatus').innerHTML = `
                <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                    <div style="text-align: center;">
                        <div style="font-weight: bold;">${risk.daily_pnl?.toLocaleString() || 0}</div>
                        <div style="color: #666; font-size: 11px;">當日損益</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-weight: bold;">${risk.current_position || 0} / ${risk.max_position || 0}</div>
                        <div style="color: #666; font-size: 11px;">部位限制</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-weight: bold;">${risk.orders_this_minute || 0} / ${risk.max_orders_per_minute || 0}</div>
                        <div style="color: #666; font-size: 11px;">下單頻率</div>
                    </div>
                </div>
            `;
        } catch (e) {
            console.error('Error loading system status:', e);
            document.getElementById('systemStatus').innerHTML = '<div class="empty-state">載入失敗: ' + e.message + '</div>';
            document.getElementById('positionOverview').innerHTML = '<div class="empty-state">載入失敗</div>';
            document.getElementById('riskStatus').innerHTML = '<div class="empty-state">載入失敗</div>';
        }
    }
    
    // 載入交易日誌
    async function loadTradeLogs() {
        try {
            const filterType = document.getElementById('logFilter')?.value || '';
            const url = filterType 
                ? '/api/trade-logs?limit=50&event_type=' + filterType
                : '/api/trade-logs?limit=50';
            
            const [logsRes, statsRes] = await Promise.all([
                fetch(url),
                fetch('/api/trade-logs/stats')
            ]);
            
            const logsData = await logsRes.json();
            const statsData = await statsRes.json();
            
            if (!logsData.success) {
                throw new Error(logsData.error || '載入失敗');
            }
            
            // 顯示日誌
            const logsContainer = document.getElementById('tradeLogs');
            const logs = logsData.data || [];
            
            if (logs.length === 0) {
                logsContainer.innerHTML = '<div class="empty-state">目前無交易日誌</div>';
            } else {
                logsContainer.innerHTML = logs.map(function(log) {
                    const typeClass = getLogTypeClass(log.event_type);
                    const icon = getLogTypeIcon(log.event_type);
                    const pnlDisplay = log.details && log.details.pnl !== undefined 
                        ? '<div style="margin-top: 4px; font-size: 13px; font-weight: bold; color: ' + (log.details.pnl >= 0 ? '#27ae60' : '#e74c3c') + ';">損益: ' + (log.details.pnl >= 0 ? '+' : '') + log.details.pnl.toLocaleString() + '</div>'
                        : '';
                    
                    return '<div style="padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px;">' +
                        '<span style="font-size: 16px;">' + icon + '</span>' +
                        '<div style="flex: 1;">' +
                            '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">' +
                                '<span style="font-weight: 500; color: #2c3e50;">' + (log.strategy_name || log.strategy_id) + ' <span style="color: #999; font-size: 11px;">(' + log.strategy_id + ')</span></span>' +
                                '<span style="font-size: 12px; color: #999;">' + log.formatted_time + '</span>' +
                            '</div>' +
                            '<div style="font-size: 14px; color: #666; line-height: 1.4;">' + log.message + '</div>' +
                            pnlDisplay +
                        '</div>' +
                        '<span class="badge ' + typeClass + '" style="font-size: 11px; padding: 3px 8px;">' + log.event_type_display + '</span>' +
                    '</div>';
                }).join('');
            }
            
            // 顯示統計
            const statsContainer = document.getElementById('logStats');
            if (statsData.success) {
                const stats = statsData.data;
                statsContainer.innerHTML = 
                    '<span>24小時: ' + stats.total_24h + ' 筆</span> | ' +
                    '<span>7天: ' + stats.total_7d + ' 筆</span> | ' +
                    '<span>下單: ' + (stats.by_type.ORDER_SUCCESS || 0) + '</span> | ' +
                    '<span>平倉: ' + (stats.by_type.CLOSE_POSITION || 0) + '</span> | ' +
                    '<span>風控: ' + (stats.by_type.RISK_BLOCKED || 0) + '</span>';
            }
            
        } catch (e) {
            console.error('Error loading trade logs:', e);
            document.getElementById('tradeLogs').innerHTML = '<div class="empty-state">載入失敗: ' + e.message + '</div>';
        }
    }
    
    function getLogTypeClass(eventType) {
        const classes = {
            'ORDER_SUCCESS': 'badge-success',
            'CLOSE_POSITION': 'badge-primary',
            'RISK_BLOCKED': 'badge-danger',
            'ORDER_FAILED': 'badge-warning',
            'SYSTEM': ''
        };
        return classes[eventType] || '';
    }
    
    function getLogTypeIcon(eventType) {
        const icons = {
            'ORDER_SUCCESS': '✅',
            'CLOSE_POSITION': '📤',
            'RISK_BLOCKED': '🛡️',
            'ORDER_FAILED': '❌',
            'SYSTEM': 'ℹ️'
        };
        return icons[eventType] || '📝';
    }
    
    // 頁面載入時執行
    loadSystemStatus();
    loadTradeLogs();
    
    // 每30秒自動刷新
    setInterval(function() {
        loadSystemStatus();
        loadTradeLogs();
    }, REFRESH_INTERVAL);
</script>
{% endblock %}
